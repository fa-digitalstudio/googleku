<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telusuri Google</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Google Sans', Arial, Roboto, sans-serif;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        /* ============== BACKGROUND ANIMASI GRADIENT ============== */
        body {
            /* Latar belakang dinamis yang bergerak pelan */
            background: linear-gradient(-45deg, #eef0f3, #e0eaf5, #eef7f2, #e8eaed);
            background-size: 400% 400%;
            animation: gradientBergerak 12s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: clamp(40px, 14vh, 110px);
            padding-left: 16px;
            padding-right: 16px;
        }

        @keyframes gradientBergerak {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ============== ANIMASI LOGO BESAR ============== */
        @keyframes munculDariAtas {
            0%   { opacity: 0; transform: translateY(-50px) scale(0.85); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes melayangPelan {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-8px); }
        }
        @keyframes hurufMelompat {
            0%,80%,100% { transform: translateY(0); }
            40%         { transform: translateY(-14px); }
        }

        .wadah-logo {
            animation: munculDariAtas 1s ease-out, melayangPelan 4.5s ease-in-out infinite;
            animation-delay: 0s, 1.1s;
            margin-bottom: clamp(22px, 5vh, 38px);
            transition: transform .35s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            /* Pantulan cahaya halus di bawah logo */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05));
        }
        .wadah-logo:hover { transform: scale(1.05); }

        .google-logo {
            width: clamp(180px, 42vw, 280px);
            height: auto;
            max-height: 110px;
            user-select: none;
            -webkit-user-drag: none;
        }
        .logo-cadangan {
            font-size: clamp(56px, 14vw, 88px);
            font-weight: normal;
            letter-spacing: -2px;
            display: none;
            line-height: 1;
        }
        .logo-cadangan span {
            display: inline-block;
            animation: hurufMelompat 2.4s ease-in-out infinite;
        }
        .logo-cadangan span:nth-child(1){ animation-delay:0.00s; color:#4285F4;}
        .logo-cadangan span:nth-child(2){ animation-delay:0.14s; color:#EA4335;}
        .logo-cadangan span:nth-child(3){ animation-delay:0.28s; color:#FBBC05;}
        .logo-cadangan span:nth-child(4){ animation-delay:0.42s; color:#4285F4;}
        .logo-cadangan span:nth-child(5){ animation-delay:0.56s; color:#34A853;}
        .logo-cadangan span:nth-child(6){ animation-delay:0.70s; color:#EA4335;}

        /* ============== KOTAK PENCARIAN (GLASSMORPHISM) ============== */
        .form-cari {
            width: 100%;
            max-width: 584px;
            min-height: 48px;
            height: clamp(46px, 7.2vh, 56px);
            /* Efek kaca tembus pandang */
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 999px;
            display: flex;
            align-items: center;
            padding: 0 12px 0 14px;
            gap: clamp(6px, 1.5vw, 14px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.04), inset 0 0 0 transparent;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }
        .form-cari:focus-within {
            /* Glow elegan hijau kebiruan saat diklik */
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 25px rgba(52, 168, 83, 0.15), 0 4px 10px rgba(66, 133, 244, 0.1);
            border: 1px solid rgba(52, 168, 83, 0.3);
            transform: scale(1.02) translateY(-2px);
        }

        .ikon-gambar-kiri {
            width:  clamp(20px, 4.2vw, 24px);
            height: clamp(20px, 4.2vw, 24px);
            flex-shrink: 0;
            display: block;
            object-fit: contain;
        }
        .ikon-svg-cadangan {
            width:  clamp(20px, 4.2vw, 24px);
            height: clamp(20px, 4.2vw, 24px);
            flex-shrink: 0;
            display: none;
        }

        .kolom-teks {
            flex: 1 1 auto;
            min-width: 0;
            background: transparent;
            border: none;
            outline: none;
            font-size: clamp(15px, 3.8vw, 18px);
            color: #202124;
            padding: 0 2px;
        }
        .kolom-teks::placeholder { color:#6b7075; font-weight: 400; }

        .tombol {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #5f6368;
            flex-shrink: 0;
            width:  clamp(32px, 6.5vw, 40px);
            height: clamp(32px, 6.5vw, 40px);
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .tombol:hover { 
            background: rgba(0, 0, 0, 0.05); 
            color: #202124;
            transform: scale(1.1);
        }
        .tombol svg {
            width:  clamp(20px, 4.2vw, 24px);
            height: clamp(20px, 4.2vw, 24px);
        }
        .input-gambar { display:none !important; }

        .sedang-mendengar {
            color:#EA4335 !important;
            animation: berdenyut 1s ease-in-out infinite;
        }
        @keyframes berdenyut {
            0%,100% { transform:scale(1); filter: drop-shadow(0 0 5px rgba(234, 67, 53, 0.4)); }
            50%     { transform:scale(1.15); filter: drop-shadow(0 0 12px rgba(234, 67, 53, 0.8)); }
        }

        /* ============== 6 PINTASAN SITUS ============== */
        @keyframes munculDariBawah {
            0%   { opacity:0; transform: translateY(30px) scale(0.9); }
            100% { opacity:1; transform: translateY(0)    scale(1);   }
        }

        .wadah-pintasan {
            width: 100%;
            max-width: 700px;
            margin-top: clamp(26px, 5.5vh, 44px);
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: clamp(8px, 2vw, 16px);
            justify-items: center;
            padding: 0 6px;
            z-index: 5;
        }

        @media (max-width: 640px){ .wadah-pintasan { grid-template-columns: repeat(3, 1fr); }}
        @media (max-width: 380px){ .wadah-pintasan { grid-template-columns: repeat(2, 1fr); }}

        .pintasan {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #3c4043;
            padding: 12px 6px;
            border-radius: 16px;
            width: 100%;
            max-width: 96px;
            animation: munculDariBawah .65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            will-change: transform;
        }
        .pintasan:nth-child(1){ animation-delay: 1.0s; }
        .pintasan:nth-child(2){ animation-delay: 1.1s; }
        .pintasan:nth-child(3){ animation-delay: 1.2s; }
        .pintasan:nth-child(4){ animation-delay: 1.3s; }
        .pintasan:nth-child(5){ animation-delay: 1.4s; }
        .pintasan:nth-child(6){ animation-delay: 1.5s; }

        .pintasan:hover {
            transform: translateY(-8px) scale(1.05);
            /* Efek hover kotak pintasan ala glass */
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.04);
            color:#202124;
        }
        .pintasan:active { transform: translateY(-2px) scale(0.96); }

        .ikon-situs {
            width:  clamp(46px, 11vw, 58px);
            height: clamp(46px, 11vw, 58px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
            overflow: hidden;
            background: #5f6368; 
            position: relative;
        }
        .ikon-situs svg { width:54%; height:54%; position: relative; z-index: 2; transition: all 0.3s; }

        /* Efek Glow Gradient pada Icon saat di-hover */
        .pintasan:hover .ikon-situs {
            transform: rotate(360deg) scale(1.1);
            background: linear-gradient(135deg, #0f9d58, #34A853); /* Warna Premium */
            box-shadow: 0 8px 20px rgba(15, 157, 88, 0.4);
        }
        .pintasan:hover .ikon-situs svg {
            transform: scale(1.1);
        }

        .nama-situs {
            font-size: clamp(11.5px, 2.6vw, 13px);
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            letter-spacing: 0.2px;
        }

        /* =========================================================
           ✨ GALERI FOTO 3D PREMIUM
           ========================================================= */
        .wadah-galeri {
            width: 100%;
            max-width: 740px;
            margin-top: clamp(20px, 4vh, 30px);
            margin-bottom: 50px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(14px, 3vw, 20px);
            padding: 0 10px;
            perspective: 1200px;
            z-index: 1;
        }

        @media (max-width: 480px){ 
            .wadah-galeri { grid-template-columns: repeat(2, 1fr); }
        }

        .foto-galeri {
            width: 100%;
            height: clamp(100px, 22vw, 140px);
            object-fit: cover;
            border-radius: 14px;
            /* Border putih tebal layaknya kartu frame premium */
            border: 3px solid rgba(255,255,255,0.9);
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            opacity: 0;
            transform-origin: center bottom; 
            animation: animasiFotoKeren 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            background-color: #f1f3f4;
        }

        .foto-galeri:nth-child(1) { animation-delay: 1.8s; }
        .foto-galeri:nth-child(2) { animation-delay: 1.95s; }
        .foto-galeri:nth-child(3) { animation-delay: 2.1s; }
        .foto-galeri:nth-child(4) { animation-delay: 2.25s; }
        .foto-galeri:nth-child(5) { animation-delay: 2.4s; }
        .foto-galeri:nth-child(6) { animation-delay: 2.55s; }

        @keyframes animasiFotoKeren {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.6) rotateX(-30deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0deg);
            }
        }

        /* Hover Effect Galeri yang Jauh Lebih Keren */
        .foto-galeri:hover {
            transform: translateY(-12px) scale(1.08) rotateX(4deg) rotateY(-4deg);
            border-color: #ffffff;
            box-shadow: 
                0 20px 30px rgba(0,0,0,0.15), 
                0 0 15px rgba(255,255,255,0.8), /* Efek Pendar Putih */
                -10px 10px 20px rgba(52, 168, 83, 0.1); /* Bias Hijau Elegan */
            z-index: 10;
        }

    </style>
</head>

    <script>
        const formCari    = document.getElementById('formCari');
        const kolomCari   = document.getElementById('kolomCari');
        const tombolMic   = document.getElementById('tombolMic');
        const tombolCam   = document.getElementById('tombolKamera');
        const pilihGambar = document.getElementById('pilihGambar');

        // 🎤 SUARA
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        let dengar=false, recog=null;
        if(SR){
            recog=new SR(); recog.lang='id-ID'; recog.interimResults=false;
            tombolMic.onclick=()=>{
                if(!dengar){ recog.start(); tombolMic.classList.add('sedang-mendengar'); dengar=true; }
                else { recog.stop(); tombolMic.classList.remove('sedang-mendengar'); dengar=false; }
            };
            recog.onresult=e=>{ kolomCari.value=e.results[0][0].transcript; setTimeout(()=>formCari.submit(),280); };
            recog.onend=recog.onerror=()=>{ tombolMic.classList.remove('sedang-mendengar'); dengar=false; };
        } else tombolMic.style.opacity=.4;

        // 📷 GOOGLE LENS
        tombolCam.onclick=()=>pilihGambar.click();
        pilihGambar.onchange=async e=>{
            const f=e.target.files[0]; if(!f) return;
            const fd=new FormData(); fd.append('encoded_image',f); fd.append('image_url','');
            try{
                const r=await fetch('https://lens.google.com/upload',{method:'POST',body:fd});
                const t=await r.text(), u=t.match(/https:\/\/lens\.google\.com\/search\?[^\s"']+/);
                if(u) location.href=u[0]; else alert('Gagal membuka Lens');
            }catch(err){
                const fr=new FileReader();
                fr.onload=ev=>open('https://www.google.com/searchbyimage?image_url='+encodeURIComponent(ev.target.result));
                fr.readAsDataURL(f);
            }
            pilihGambar.value='';
        };
    </script>
